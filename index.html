<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Gamificado DBV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==========================================
           ESTILOS BASE
           ========================================== */
        body {
            background-color: #020617; /* slate-950 */
            color: #f1f5f9; /* slate-100 */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* ==========================================
           ANIMAÇÕES DE ENTRADA (LOAD)
           ========================================== */
        @keyframes slideInBounce {
            0% { opacity: 0; transform: translateY(60px) scale(0.9); }
            60% { opacity: 1; transform: translateY(-5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .animate-entrance {
            animation: slideInBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        /* ==========================================
           ANIMAÇÕES DE FUNDO (ORBS FLUTUANTES)
           ========================================== */
        @keyframes floatBg1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5vw, -5vh) scale(1.1); }
            66% { transform: translate(-3vw, 4vh) scale(0.9); }
        }
        @keyframes floatBg2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-5vw, 6vh) scale(1.2); }
            66% { transform: translate(4vw, -4vh) scale(0.8); }
        }
        .bg-glow {
            position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: -1;
        }
        .bg-glow-1 { animation: floatBg1 18s infinite ease-in-out; }
        .bg-glow-2 { animation: floatBg2 22s infinite ease-in-out reverse; }

        /* ==========================================
           ANIMAÇÃO DO TÍTULO (GRADIENT SHIFT)
           ========================================== */
        @keyframes textShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .animate-title-gradient {
            background-size: 200% auto;
            animation: textShimmer 4s linear infinite;
        }

        /* ==========================================
           ANIMAÇÃO DA CHAMA E PARTÍCULAS (1º LUGAR)
           ========================================== */
        @keyframes flame-pulse {
            0%, 100% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 8px rgba(249,115,22,0.8)) brightness(1); }
            50% { transform: scale(1.15) rotate(2deg); filter: drop-shadow(0 0 16px rgba(249,115,22,1)) brightness(1.2); }
        }
        .animate-flame {
            animation: flame-pulse 1.5s infinite ease-in-out;
            color: #f97316; 
        }

        /* Partículas a subir */
        @keyframes sparkUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-60px) scale(0); opacity: 0; }
        }
        .spark {
            position: absolute; width: 4px; height: 4px; background: #fbbf24; border-radius: 50%;
            box-shadow: 0 0 8px #f59e0b; pointer-events: none; z-index: 0; opacity: 0;
        }

        /* ==========================================
           BARRA DE PROGRESSO & SHIMMER
           ========================================== */
        .progress-fill {
            position: relative; overflow: hidden;
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease, box-shadow 0.5s ease;
        }
        
        @keyframes shimmerBar {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
        .progress-fill::after {
            content: ''; position: absolute; top: 0; left: -20px; bottom: 0; width: 40px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmerBar 2.5s infinite linear;
        }

        /* ==========================================
           LISTA E EFEITOS HOVER
           ========================================== */
        #ranking-list {
            position: relative; width: 100%; transition: height 0.5s ease; perspective: 1000px;
        }

        .ranking-item-wrapper {
            position: absolute; left: 0; right: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* Animação suave de troca de lugar */
            height: 105px;
        }

        .inner-card {
            height: 100%; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .ranking-item-wrapper:hover .inner-card {
            transform: translateY(-4px) scale(1.015);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4) !important;
            z-index: 20;
        }

        .ranking-item-wrapper:hover .inner-card.first-place-card {
            border-color: rgba(249, 115, 22, 0.6) !important;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.6), 0 0 20px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 relative selection:bg-indigo-500/30">

    <!-- Decorações de Fundo Flutuantes -->
    <div class="bg-glow bg-glow-1 w-[45vw] h-[45vw] bg-indigo-600/20 top-[-15%] left-[-10%]"></div>
    <div class="bg-glow bg-glow-2 w-[40vw] h-[40vw] bg-orange-600/15 bottom-[-10%] right-[-10%]"></div>
    <div class="bg-glow bg-glow-1 w-[30vw] h-[30vw] bg-cyan-600/10 top-[30%] left-[40%]" style="animation-delay: -5s"></div>

    <main class="max-w-3xl mx-auto relative z-10">
        <!-- Cabeçalho Animado -->
        <header class="text-center mb-12 mt-6 animate-entrance" style="animation-delay: 0.1s">
            <div class="inline-flex items-center justify-center p-3 glass-panel rounded-full mb-4 shadow-[0_0_20px_rgba(99,102,241,0.2)] hover:scale-105 transition-transform duration-500">
                <svg class="w-8 h-8 text-indigo-400 mr-2 animate-[spin_10s_linear_infinite]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
                <h1 class="text-3xl sm:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-cyan-400 to-indigo-400 animate-title-gradient tracking-tight">
                    Ranking DBV
                </h1>
            </div>
            <p class="text-slate-400 max-w-lg mx-auto text-sm sm:text-base leading-relaxed">
                Acompanhe o seu saldo rumo ao <a href="https://camporidsa.org/" target="_blank" rel="noopener noreferrer" class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 hover:from-indigo-400 hover:to-cyan-400 transition-all duration-300 border-b border-indigo-500/30 hover:border-cyan-400">Campori DSA 2027</a>. O objetivo final é alcançar a marca de <span class="text-orange-400 font-bold px-1 bg-orange-400/10 rounded">R$ 1.200,00</span>. O primeiro classificado carrega a chama!
            </p>
        </header>

        <!-- Container da Lista -->
        <div id="ranking-list">
            <!-- Os itens serão gerados aqui pelo JavaScript -->
        </div>
    </main>

    <script>
        // Configurações e Dados Iniciais
        const GOAL = 1200;
        const ITEM_HEIGHT = 105;
        const ITEM_GAP = 16;
        
        // Formatador de Moeda
        const formatMoney = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }).format(value);
        };
        
        // Dados: Agora incluem a meta do mês e o valor já depositado no mês atual
        let dbvs = [
    {
        id: 1,
        name: 'Clara Pontharelo',
        score: 275,
        monthlyGoal: 0,
        currentMonthDeposited: 275
    },
    {
        id: 2,
        name: 'Lara',
        score: 220,
        monthlyGoal: 0,
        currentMonthDeposited: 20
    },
    {
        id: 3,
        name: 'Irlan',
        score: 180,
        monthlyGoal: 0,
        currentMonthDeposited: 160
    },
    {
        id: 5,
        name: 'Rafael',
        score: 80,
        monthlyGoal: 0,
        currentMonthDeposited: 20
    },
    {
        id: 6,
        name: 'Anne Karoline',
        score: 60,
        monthlyGoal: 0,
        currentMonthDeposited: 20
    },
    {
        id: 7,
        name: 'Arthur',
        score: 60,
        monthlyGoal: 0,
        currentMonthDeposited: 60
    },
    {
        id: 8,
        name: 'Akilles Carvalho Maciel',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 20
    },
    {
        id: 9,
        name: 'Pedro Henrique',
        score: 20,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 11,
        name: 'Sophia',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 12,
        name: 'Valter',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 13,
        name: 'Gabriel',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 14,
        name: 'Guilherme',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 15,
        name: 'Heitor',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 16,
        name: 'Valentina',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 17,
        name: 'Carlos',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    },
    {
        id: 18,
        name: 'Renato',
        score: 0,
        monthlyGoal: 0,
        currentMonthDeposited: 0
    }
];

        const container = document.getElementById('ranking-list');

        // Ícones em formato SVG
        const icons = {
            flame: `<svg class="w-8 h-8 animate-flame relative z-10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>`,
            trophy: `<svg class="w-7 h-7 text-gray-300 drop-shadow-[0_0_5px_rgba(209,213,219,0.6)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
            medal: `<svg class="w-7 h-7 text-amber-600 drop-shadow-[0_0_5px_rgba(217,119,6,0.6)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="M13 12l5.88-9.8"/><path d="M8 7h8"/><circle cx="12" cy="17" r="5"/></svg>`,
            award: `<svg class="w-6 h-6 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>`,
            star: `<svg class="w-6 h-6 text-slate-500 hover:text-indigo-400 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
        };

        // Função de Animação Numérica (Conta de 0 até o valor)
        function animateValue(obj, start, end, duration, formatter) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out quint
                const easeOut = 1 - Math.pow(1 - progress, 5); 
                const currentVal = progress === 1 ? end : Math.floor(start + (end - start) * easeOut);
                
                // Usa o formatador passado como parâmetro
                obj.textContent = formatter(currentVal);
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Função para criar faíscas dinâmicas para o 1º lugar
        function createSparks() {
            let sparksHTML = '';
            for(let i=0; i<6; i++) {
                const left = Math.random() * 100; // Posição horizontal aleatória
                const delay = Math.random() * 2;  // Atraso aleatório
                const duration = 1 + Math.random(); // Duração aleatória
                sparksHTML += `<div class="spark" style="left: ${left}%; animation: sparkUp ${duration}s infinite linear; animation-delay: ${delay}s;"></div>`;
            }
            return sparksHTML;
        }

        // Função para determinar a cor da barra baseada na percentagem
        function getProgressBarStyles(percentage) {
            if (percentage >= 100) return 'bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500 shadow-[0_0_15px_rgba(250,204,21,0.8)]';
            if (percentage >= 75) return 'bg-gradient-to-r from-green-400 to-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]';
            if (percentage >= 40) return 'bg-gradient-to-r from-yellow-400 to-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.4)]';
            return 'bg-gradient-to-r from-red-500 to-rose-600 shadow-[0_0_8px_rgba(225,29,72,0.4)]';
        }

        // Função para obter o ícone de classificação
        function getRankIcon(index, percentage) {
            if (index === 0) return icons.flame;
            if (index === 1) return icons.trophy;
            if (index === 2) return icons.medal;
            if (percentage >= 100) return icons.award;
            return icons.star;
        }

        // Ordenar dados e atualizar a posição no ecrã
        function sortAndRender(initialLoad = false) {
            dbvs.sort((a, b) => b.score - a.score);

            container.style.height = `${dbvs.length * (ITEM_HEIGHT + ITEM_GAP)}px`;

            dbvs.forEach((dbv, index) => {
                let wrapperEl = document.getElementById(`dbv-wrapper-${dbv.id}`);
                const percentage = Math.min((dbv.score / GOAL) * 100, 100);

                if (!wrapperEl) {
                    wrapperEl = document.createElement('div');
                    wrapperEl.id = `dbv-wrapper-${dbv.id}`;
                    wrapperEl.className = 'ranking-item-wrapper';
                    
                    // Lógica para a etiqueta de status do mês
                    let statusBadge = '';
                    if (dbv.currentMonthDeposited >= dbv.monthlyGoal) {
                        statusBadge = '<span class="ml-2 px-1.5 py-0.5 bg-emerald-500/20 text-emerald-400 rounded text-[9px] uppercase tracking-wider font-bold border border-emerald-500/20">Em dia</span>';
                    } else if (dbv.currentMonthDeposited > 0) {
                        statusBadge = '<span class="ml-2 px-1.5 py-0.5 bg-amber-500/20 text-amber-400 rounded text-[9px] uppercase tracking-wider font-bold border border-amber-500/20">Parcial</span>';
                    } else {
                        statusBadge = '<span class="ml-2 px-1.5 py-0.5 bg-rose-500/20 text-rose-400 rounded text-[9px] uppercase tracking-wider font-bold border border-rose-500/20">Pendente</span>';
                    }
                    
                    wrapperEl.innerHTML = `
                        <div class="animate-entrance" style="animation-delay: ${0.2 + (index * 0.15)}s; height: 100%;">
                            <div class="inner-card glass-panel rounded-2xl p-4 flex flex-col justify-center overflow-hidden">
                                <!-- Container de Partículas (Invisível por padrão) -->
                                <div class="particles-container absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-500">
                                    ${createSparks()}
                                </div>
                                
                                <div class="flex items-center justify-between mb-3 relative z-10">
                                    <div class="flex items-center space-x-2 sm:space-x-4">
                                        <div class="rank-number text-xl sm:text-2xl font-black text-slate-700/50 w-6 sm:w-8 text-center tabular-nums transition-colors duration-500"></div>
                                        <div class="icon-container flex items-center justify-center w-8 h-8 flex-shrink-0 relative">
                                            <!-- Ícone dinâmico -->
                                        </div>
                                        <div class="flex flex-col min-w-0">
                                            <h3 class="text-base sm:text-lg font-bold text-slate-100 truncate tracking-wide">${dbv.name}</h3>
                                            <div class="flex flex-col mt-0.5 gap-1">
                                                <div class="text-xs font-medium text-slate-400 flex items-center gap-1.5">
                                                    <span class="opacity-70 text-[10px] uppercase tracking-wider">Total:</span>
                                                    <span class="score-text text-sm text-slate-200 font-bold" data-val="0">R$ 0,00</span> 
                                                    <span class="opacity-50">/ ${formatMoney(GOAL)}</span>
                                                </div>
                                                <div class="text-[11px] font-medium text-slate-500 flex items-center gap-1.5">
                                                    <span class="opacity-70 text-[9px] uppercase tracking-wider">Mês:</span>
                                                    <span class="month-paid-text text-indigo-300 font-bold" data-val="0">R$ 0,00</span>
                                                    <span class="opacity-50">/ ${formatMoney(dbv.monthlyGoal)}</span>
                                                    ${statusBadge}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="flex items-center gap-3 flex-shrink-0">
                                        <div class="text-right hidden sm:block">
                                            <div class="text-sm font-bold text-slate-200 percentage-text">0%</div>
                                            <div class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Concluído</div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Barra de Fundo -->
                                <div class="w-full h-2 sm:h-2.5 bg-slate-900/80 rounded-full overflow-hidden shadow-inner border border-slate-700/60 relative z-10">
                                    <!-- Barra de Progresso Animada -->
                                    <div class="progress-fill h-full rounded-full w-0"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(wrapperEl);
                }

                const innerCard = wrapperEl.querySelector('.inner-card');
                const particles = wrapperEl.querySelector('.particles-container');
                const yPos = index * (ITEM_HEIGHT + ITEM_GAP);
                
                // Mover fisicamente o cartão (JS Reordering)
                wrapperEl.style.transform = `translateY(${yPos}px)`;
                
                // Estilos Especiais Baseados na Posição
                if (index === 0) {
                    innerCard.style.backgroundColor = 'rgba(30, 41, 59, 0.85)';
                    innerCard.style.borderColor = 'rgba(249, 115, 22, 0.4)';
                    innerCard.classList.add('first-place-card');
                    particles.style.opacity = '1'; // Liga as partículas
                } else {
                    innerCard.style.backgroundColor = 'rgba(30, 41, 59, 0.6)';
                    innerCard.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    innerCard.classList.remove('first-place-card');
                    particles.style.opacity = '0'; // Desliga partículas
                }

                // Atualizações dinâmicas da UI (com pequeno delay para permitir as transições de carregamento)
                setTimeout(() => {
                    const progressBar = wrapperEl.querySelector('.progress-fill');
                    const scoreText = wrapperEl.querySelector('.score-text');
                    const iconContainer = wrapperEl.querySelector('.icon-container');
                    const percentageText = wrapperEl.querySelector('.percentage-text');
                    const rankNumber = wrapperEl.querySelector('.rank-number');
                    const monthPaidText = wrapperEl.querySelector('.month-paid-text');

                    // Atualizar Número do Ranking (#1, #2, etc)
                    rankNumber.textContent = `#${index + 1}`;
                    if (index === 0) rankNumber.className = 'rank-number text-xl sm:text-2xl font-black text-orange-500/90 w-6 sm:w-8 text-center tabular-nums drop-shadow-[0_0_8px_rgba(249,115,22,0.6)] transition-colors duration-500';
                    else if (index === 1) rankNumber.className = 'rank-number text-xl sm:text-2xl font-black text-slate-300/80 w-6 sm:w-8 text-center tabular-nums transition-colors duration-500';
                    else if (index === 2) rankNumber.className = 'rank-number text-xl sm:text-2xl font-black text-amber-600/80 w-6 sm:w-8 text-center tabular-nums transition-colors duration-500';
                    else rankNumber.className = 'rank-number text-xl sm:text-2xl font-black text-slate-700/60 w-6 sm:w-8 text-center tabular-nums transition-colors duration-500';

                    // Animar Números em vez de os espetar logo
                    const currentVal = parseInt(scoreText.getAttribute('data-val') || 0);
                    if (currentVal !== dbv.score) {
                        animateValue(scoreText, currentVal, dbv.score, 1500, formatMoney);
                        scoreText.setAttribute('data-val', dbv.score); // guarda o valor para não animar de novo se não mudar
                    }

                    // Animar Valor do Mês
                    if (monthPaidText) {
                        const currentMonthVal = parseInt(monthPaidText.getAttribute('data-val') || 0);
                        if (currentMonthVal !== dbv.currentMonthDeposited) {
                            animateValue(monthPaidText, currentMonthVal, dbv.currentMonthDeposited, 1500, formatMoney);
                            monthPaidText.setAttribute('data-val', dbv.currentMonthDeposited);
                        }
                    }

                    // Animar Percentagem (Contador Simples)
                    const oldPercent = parseInt(percentageText.textContent) || 0;
                    const newPercent = Math.floor(percentage);
                    if(oldPercent !== newPercent) {
                        animateValue(percentageText, oldPercent, newPercent, 1500, (val) => `${val}%`);
                    }

                    // Atualizar visual da barra e ícones
                    progressBar.className = `progress-fill h-full rounded-full ${getProgressBarStyles(percentage)}`;
                    progressBar.style.width = `${percentage}%`;
                    iconContainer.innerHTML = getRankIcon(index, percentage);

                }, initialLoad ? 100 : 0);
            });
        }

        // Inicializar a aplicação
        window.addEventListener('DOMContentLoaded', () => {
            sortAndRender(true);
        });
    </script>
</body>
</html>
